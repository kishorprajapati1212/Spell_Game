<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>SpellShape Arena Online</title><style>
:root{--bg:#050714;--panel:#0b1328;--panel2:#111b36;--line:#2b3c67;--text:#eff6ff;--muted:#98a9ce;--cyan:#55e6ff;--violet:#9b70ff;--gold:#ffd166;--red:#ff5575;--green:#5ff0a2;--blue:#78b9ff;--orange:#ff9d43}*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:#040611;color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}body{background:radial-gradient(circle at 20% 0,#1a2a62 0,#081026 38%,#040611 78%)}button,input,select{font:inherit}button{border:1px solid #344774;background:#14203c;color:var(--text);border-radius:12px;padding:9px 12px;font-weight:900;cursor:pointer}button:hover{filter:brightness(1.15)}.primary{border:0;background:linear-gradient(135deg,var(--cyan),var(--violet));color:#05111d}.danger{border:0;background:linear-gradient(135deg,var(--orange),var(--red));color:#1b0509}.app{height:100%;display:grid;grid-template-rows:auto 1fr;gap:8px;padding:10px;max-width:1500px;margin:auto}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#091126e8;border:1px solid var(--line);border-radius:18px;padding:10px 12px}.brand{display:flex;gap:10px;align-items:center}.logo{width:42px;height:42px;border-radius:14px;background:radial-gradient(circle at 35% 30%,#fff,#61ecff 18%,#9470ff 55%,#111b36 56%);box-shadow:0 0 22px #55e6ff55}.brand h1{font-size:22px;margin:0;line-height:1}.brand span,.small{font-size:12px;color:var(--muted)}.topBtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.shell{min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 370px;gap:8px}.stage{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:20px;background:#050713}.hud{position:absolute;z-index:4;inset:10px 10px auto 10px;display:grid;grid-template-columns:1fr auto 1fr;gap:10px;pointer-events:none}.card{background:#071021e8;border:1px solid #2a3a62;border-radius:15px;padding:9px}.card.right{text-align:right}.name{font-weight:1000}.bar{height:12px;background:#1c2946;border:1px solid #35466f;border-radius:30px;overflow:hidden;margin-top:6px}.fill{height:100%;transition:width .2s}.hp{background:linear-gradient(90deg,#ff3e65,#ffd166)}.mana{background:linear-gradient(90deg,#34dfff,#906cff)}.center{text-align:center;min-width:230px;background:#071021e8;border:1px solid #2a3a62;border-radius:15px;padding:9px 13px}.turn{font-weight:1000;color:var(--gold)}#arena{display:block;width:100%;height:100%}.panel{min-height:0;display:grid;grid-template-rows:auto auto 1fr auto;background:#091126;border:1px solid var(--line);border-radius:20px;overflow:hidden}.section{padding:12px;border-bottom:1px solid var(--line)}.section h2{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:#cdd9ff}.castArea{display:grid;place-items:center;gap:8px}#castCanvas{width:270px;height:270px;border-radius:50%;background:#071021;border:2px solid #344772;touch-action:none;cursor:crosshair}.spellList{overflow:auto;padding:10px;display:grid;gap:7px;align-content:start}.spell{display:grid;grid-template-columns:48px 1fr auto;gap:9px;align-items:center;border:1px solid #26365d;background:#0c152b;border-radius:14px;padding:8px}.glyph{width:48px;height:48px;border-radius:13px;background:#151f3a;display:grid;place-items:center;font-size:25px}.spell b{font-size:13px}.spell p{font-size:11px;color:var(--muted);margin:2px 0 0;line-height:1.25}.cost{font-size:12px;font-weight:1000;color:var(--cyan)}.log{height:128px;overflow:auto;background:#070d1b;padding:10px;font-size:12px;color:#d4def7}.log p{margin:0 0 6px}.menu,.modal{position:fixed;inset:0;z-index:30;background:linear-gradient(135deg,#03050df6,#0b1230f6);display:grid;place-items:center;padding:16px}.modal{display:none;z-index:40;background:#02040bd8}.box{width:min(1100px,100%);max-height:92vh;overflow:auto;background:#0b1329;border:1px solid #344772;border-radius:26px;box-shadow:0 30px 90px #0009;padding:20px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab.active{background:linear-gradient(135deg,#55e6ff,#9b70ff);color:#06101c;border:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mode,.manualBox{border:1px solid #2c3d66;background:#0e1932;border-radius:18px;padding:14px}.mode h3,.manualBox h3{margin:0 0 6px}.mode p,.manualBox p,.manualBox li{color:#c7d5f4;line-height:1.45}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.row input,.row select{width:100%;border:1px solid #334772;background:#071021;color:var(--text);border-radius:12px;padding:11px}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#17284c;color:#b9c8ec;font-size:12px;margin:2px}.toast{position:fixed;z-index:50;left:50%;top:78px;transform:translateX(-50%);background:#06101ced;border:1px solid #55e6ff88;border-radius:999px;padding:10px 15px;font-weight:1000;opacity:0;transition:.15s}.toast.show{opacity:1;top:92px}@media(max-width:1050px){html,body{overflow:auto}.app{height:auto;min-height:100%}.shell{grid-template-columns:1fr}.stage{height:56vh;min-height:410px}.panel{grid-template-rows:auto auto auto auto}.grid{grid-template-columns:1fr}}@media(max-width:620px){.top{align-items:flex-start}.brand h1{font-size:18px}.hud{grid-template-columns:1fr 1fr}.center{grid-column:1/3;order:3}.stage{height:50vh;min-height:350px}.row{grid-template-columns:1fr}#castCanvas{width:230px;height:230px}}
</style></head><body><div class="app"><header class="top"><div class="brand"><div class="logo"></div><div><h1>SpellShape Arena</h1><span>Realtime-ready rune duel: Turn, Rapid, and Continuous casting</span></div></div><div class="topBtns"><button id="menuBtn">Menu</button><button id="manualBtn">Manual</button><button id="restart" class="danger">Restart</button></div></header><main class="shell"><section class="stage"><div class="hud"><div class="card" id="hud0"></div><div class="center"><div class="turn" id="turnText">Open menu</div><div class="small" id="subText">Choose a mode</div><div class="small" id="onlineText"></div></div><div class="card right" id="hud1"></div></div><canvas id="arena"></canvas></section><aside class="panel"><div class="section castArea"><h2 id="castTitle">Casting Circle</h2><canvas id="castCanvas" width="320" height="320"></canvas><div class="small" id="recognition">Draw a rune, release to cast.</div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center"><button id="clear">Clear</button><button id="rest">Rest / Skip</button><button id="quickManual">Rune Manual</button></div></div><div class="section"><h2>Match Status</h2><div class="small" id="modeInfo"></div></div><div class="spellList" id="spellList"></div><div class="log" id="log"></div></aside></main></div><div class="menu" id="menu"><div class="box"><h1 style="margin:0">SpellShape Arena</h1><p class="small" style="font-size:14px">Play locally, against AI, or connect through the included WebSocket server for realtime sharing with a friend.</p><div class="tabs"><button class="tab active" data-tab="play">Play</button><button class="tab" data-tab="online">Realtime Online</button><button class="tab" data-tab="manual">Manual</button></div><div id="tabContent"></div></div></div><div class="modal" id="modal"><div class="box" id="modalBox"></div></div><div class="toast" id="toast"></div><script>
(()=>{'use strict';const $=id=>document.getElementById(id);const arena=$('arena'),ctx=arena.getContext('2d',{alpha:false});const cast=$('castCanvas'),cctx=cast.getContext('2d');const DPR=Math.min(1.6,devicePixelRatio||1);let W=0,H=0,drawPts=[],drawing=false,projectiles=[],particles=[],texts=[];const spells={circle:{n:'Fireball',g:'○',cost:18,col:'#ff5575',effect:'damage + burn',tip:'Draw a full circle'},triangle:{n:'Thunder Lance',g:'△',cost:16,col:'#ffd166',effect:'damage + stun',tip:'Draw a triangle'},zigzag:{n:'Wind Slash',g:'〰',cost:12,col:'#55e6ff',effect:'damage + evade',tip:'Draw W/M zigzag'},square:{n:'Stone Guard',g:'□',cost:14,col:'#d6e2ff',effect:'shield + counter',tip:'Draw a square'},line:{n:'Life Stream',g:'│',cost:20,col:'#5ff0a2',effect:'heal + regen',tip:'Draw vertical line'},spiral:{n:'Frost Coil',g:'◎',cost:18,col:'#78b9ff',effect:'damage + slow',tip:'Draw a spiral'},chevron:{n:'Shadow Fang',g:'∨',cost:10,col:'#ad7cff',effect:'lifesteal',tip:'Draw V shape'},slash:{n:'Solar Cut',g:'╱',cost:13,col:'#ffb74d',effect:'shield pierce',tip:'Draw diagonal slash'},wave:{n:'Tide Wave',g:'≈',cost:15,col:'#4dd7ff',effect:'damage + mana drain',tip:'Draw smooth wave'},hook:{n:'Void Hook',g:'ↄ',cost:17,col:'#c088ff',effect:'break shield',tip:'Draw C/hook shape'}};const combos={
 'circle+zigzag':{n:'Flame Tornado',col:'#ff7a38',txt:'bonus fire storm damage + burn spread'},

};function comboFor(a,b){return combos[a+'+'+b]||null}function fighter(n,side,ai){return{name:n,side,ai,x:side?.73:.27,y:.66,hp:140,maxHp:140,mana:100,maxMana:100,shield:0,status:[],hit:0,cast:0,cool:0,lastRune:null}}let state={match:'ai',flow:'turn',turn:0,round:1,locked:false,winner:null,pending:[null,null],f:[fighter('Player 1',0,false),fighter('AI Warlock',1,true)]};let net={ws:null,api:null,transport:'ntfy',client:Math.random().toString(36).slice(2),role:null,room:null,host:false,connected:false,peer:false,names:['Player 1','Player 2'],lastSeq:0,pollTimer:null,es:null};function defaultWS(){return 'https://ntfy.sh'}function apiBase(u){return (u||defaultWS()).replace(/^wss:/,'https:').replace(/^ws:/,'http:').replace(/\/$/,'')}function resize(){let r=arena.getBoundingClientRect();W=Math.max(330,Math.floor(r.width*DPR));H=Math.max(280,Math.floor(r.height*DPR));arena.width=W;arena.height=H}addEventListener('resize',resize,{passive:true});resize();const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>a+Math.random()*(b-a),lerp=(a,b,t)=>a+(b-a)*t,pxy=f=>({x:f.x*W,y:f.y*H});function start(match='ai',flow='turn',p1='Player 1',p2='Player 2'){state={match,flow,turn:0,round:1,locked:false,winner:null,pending:[null,null],f:[fighter(p1||'Player 1',0,match==='aivai'),fighter(match==='ai'?'AI Warlock':(p2||'Player 2'),1,match!=='pvp'&&match!=='online')]};if(match==='aivai'){state.f[0].name='AI Oracle';state.f[1].name='AI Warlock'}clearFX();drawBase();$('log').innerHTML='';log('Match started: <b>'+state.f[0].name+'</b> vs <b>'+state.f[1].name+'</b>. Flow: <b>'+flowName()+'</b>.');$('menu').style.display='none';renderUI();if(net.host)sendNet({type:'startGame',config:{flow,p1,p2}});maybeAI();syncState()}function flowName(){return state.flow==='turn'?'Turn-by-turn':state.flow==='rapid'?'Rapid simultaneous':'Continuous realtime'}function renderUI(){let a=state.f[0],b=state.f[1];$('hud0').innerHTML=card(a);$('hud1').innerHTML=card(b);$('modeInfo').innerHTML='<b>'+flowName()+'</b> • '+(state.match==='online'?'Online room '+net.room:state.match==='pvp'?'Local 2-player':state.match==='ai'?'VS AI':'AI vs AI')+'<br>'+flowHelp();let you=net.connected?net.role:null,actor=state.f[state.turn];let main=state.winner?state.winner.name+' wins':state.flow==='turn'?'Round '+state.round+' — '+actor.name:state.flow==='rapid'?'Rapid Round '+state.round:'Continuous Battle';let sub='';if(state.winner)sub='Open menu or restart';else if(state.match==='online'){let can=canDraw();sub=can?'YOUR ACTION: draw a rune now':'OPPONENT ACTION: wait for opponent';}else if(state.flow==='turn')sub=(actor.ai?'AI is casting...':actor.name+' turn: draw a rune');else if(state.flow==='rapid')sub=pendingText();else sub='Draw whenever your caster cooldown is ready';$('turnText').textContent=main;$('subText').textContent=sub;$('castTitle').textContent=canDraw()?'Your Casting Circle':'Waiting / Locked';$('onlineText').textContent=net.connected?'You are Player '+(net.role+1)+' • '+(net.host?'Host':'Guest'):''}function card(f){return'<div class="name">'+f.name+(f.ai?' 🤖':'')+'</div><div class="small">HP '+Math.ceil(f.hp)+'/'+f.maxHp+' • Mana '+Math.ceil(f.mana)+'/'+f.maxMana+'</div>'+bar(f.hp,f.maxHp,'hp')+bar(f.mana,f.maxMana,'mana')+'<div class="small">Shield '+Math.ceil(f.shield)+' '+f.status.map(s=>s.n+':'+s.t).join(' ')+'</div>'}function bar(v,m,cls){return'<div class="bar"><div class="fill '+cls+'" style="width:'+clamp(v/m*100,0,100)+'%"></div></div>'}function pendingText(){return 'P1 '+(state.pending[0]?'ready':'drawing')+' • P2 '+(state.pending[1]?'ready':'drawing')}function flowHelp(){if(state.flow==='turn')return 'Only the active player can draw. UI says YOUR ACTION or OPPONENT ACTION.';if(state.flow==='rapid')return 'Both players choose a rune, then both attacks resolve together.';return 'No turns: draw as soon as your cooldown is ready. Online players can cast independently.'}function log(s){let p=document.createElement('p');p.innerHTML=s;$('log').prepend(p)}function toast(s){$('toast').textContent=s;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1200)}function clearFX(){projectiles=[];particles=[];texts=[]}
function drawScene(t){ctx.fillStyle='#070914';ctx.fillRect(0,0,W,H);let gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#14245a');gr.addColorStop(.56,'#071021');gr.addColorStop(1,'#040611');ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);ctx.strokeStyle='#263a70';ctx.lineWidth=2*DPR;for(let i=0;i<8;i++){let p=i/7;ctx.beginPath();ctx.moveTo(lerp(W*.09,W*.91,p),H*.76);ctx.lineTo(lerp(W*.34,W*.66,p),H*.50);ctx.stroke()}ctx.fillStyle='#151d3a';ctx.beginPath();ctx.ellipse(W*.5,H*.76,W*.44,H*.18,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#5269aa';ctx.beginPath();ctx.ellipse(W*.5,H*.76,W*.44,H*.18,0,0,Math.PI*2);ctx.stroke();ctx.save();ctx.translate(W*.5,H*.32);ctx.rotate(t*.00015);ctx.strokeStyle='#55e6ff38';ctx.beginPath();ctx.arc(0,0,Math.min(W,H)*.18,0,Math.PI*2);ctx.stroke();for(let i=0;i<12;i++){ctx.rotate(Math.PI/6);ctx.beginPath();ctx.moveTo(Math.min(W,H)*.14,0);ctx.lineTo(Math.min(W,H)*.21,0);ctx.stroke()}ctx.restore();drawMage(state.f[0],t);drawMage(state.f[1],t);drawObjects(t)}function drawMage(f,t){let p=pxy(f),dir=f.side?-1:1,s=Math.min(W,H)/620,b=Math.sin(t*.004+f.side)*4*s;ctx.save();ctx.translate(p.x+(f.hit?rnd(-2,2)*DPR:0),p.y+b);ctx.scale(dir*s,s);ctx.fillStyle='#0008';ctx.beginPath();ctx.ellipse(0,76,64,18,0,0,Math.PI*2);ctx.fill();if(f.shield>0){ctx.strokeStyle='#d9f2ff99';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,8,74+Math.sin(t*.006)*3,0,Math.PI*2);ctx.stroke()}let robe=ctx.createLinearGradient(-40,-35,45,88);robe.addColorStop(0,f.side?'#8d61ff':'#24d7ff');robe.addColorStop(1,'#111936');ctx.fillStyle=robe;ctx.beginPath();ctx.moveTo(-36,-12);ctx.quadraticCurveTo(0,-48,36,-12);ctx.lineTo(52,82);ctx.quadraticCurveTo(0,102,-52,82);ctx.closePath();ctx.fill();ctx.strokeStyle='#dce8ff44';ctx.stroke();ctx.fillStyle='#f1c197';ctx.beginPath();ctx.arc(0,-50,23,0,Math.PI*2);ctx.fill();ctx.fillStyle=f.side?'#2d153f':'#132a40';ctx.beginPath();ctx.moveTo(-28,-52);ctx.quadraticCurveTo(0,-92,28,-52);ctx.quadraticCurveTo(0,-68,-28,-52);ctx.fill();ctx.strokeStyle='#d8b76 function makeRoomCode(){return Math.random().toString(36).slice(2,8).toUpperCase()}function ntfyTopic(){return 'spellshape-arena-'+String(net.room||'').toLowerCase()}function roomLink(){let isWeb=location.protocol==='http:'||location.protocol==='https:';let isRelay=location.hostname.includes('ntfy.sh');return isWeb&&!isRelay?(location.origin+location.pathname+'?room='+encodeURIComponent(net.room||'')):''}function updateRoomBox(){let el=$('onlineRoom');if(!el)return;let link=roomLink(),p1=net.names[0]||'Player 1',p2=net.names[1]||'Waiting...';let lobby='<div style="margin-top:10px;padding:10px;border:1px solid #344772;border-radius:14px;background:#071021"><b>Lobby Status</b><br><span class="pill">P1: '+p1+'</span> <span class="pill">P2: '+(net.peer?p2:'Waiting for friend...')+'</span><br><span class="small">'+(net.host?(net.peer?'Friend connected — choose a mode and press Start Online Match.':'Waiting for friend to join with the code.'):'Joined room — wait for host to start.')+'</span></div>';el.innerHTML=net.room?('Room code: <b style="font-size:22px;color:#ffd166">'+net.room+'</b> • You are Player '+(net.role+1)+'<br><b>Send ONLY this room code to your friend:</b><br><input readonly value="'+net.room+'" style="width:100%;margin-top:6px;border:1px solid #334772;background:#071021;color:white;border-radius:10px;padding:8px;font-size:18px;font-weight:900;text-align:center">'+(link?'<br>Optional game join link:<br><input readonly value="'+link+'" style="width:100%;margin-top:6px;border:1px solid #334772;background:#071021;color:white;border-radius:10px;padding:8px">':'')+lobby+'<br><span class="small"><b>Important:</b> Your friend must open this same game HTML/page, not ntfy.sh. ntfy.sh is only the message relay, not the game website.</span><br><span class="small">Relay in use: '+(net.api||'https://ntfy.sh')+'</span>'):''}
function processNet(m){if(!m)return;if(m.sender&&m.sender===net.client)return;if(m.msg)m=m.msg;if(m.roomState&&m.roomState.players)net.names=m.roomState.players.map((x,i)=>x||('Player '+(i+1)));if(m.type==='created'||m.type==='joined'){net.connected=true;net.room=m.room;net.role=m.player;net.host=m.player===0;state.match='online';state.f[0].name=net.names[0]||'Player 1';state.f[1].name=net.names[1]||'Player 2';toast((net.host?'Created ':'Joined ')+'room '+m.room);updateRoomBox();renderUI()}if(m.type==='hostOpen'&&!net.host){if(m.name)net.names[0]=m.name;state.f[0].name=net.names[0];updateRoomBox();renderUI()}if(m.type==='peerJoined'){net.peer=true;toast('Friend joined. Host can start match.');if(m.name)net.names[1]=m.name;state.f[0].name=net.names[0]||'Player 1';state.f[1].name=net.names[1]||'Player 2';updateRoomBox();renderUI();if(net.host)syncState()}if(m.type==='startGame'){net.peer=true;net.names=[m.config.p1||'Player 1',m.config.p2||'Player 2'];start('online',m.config.flow,net.names[0],net.names[1])}if(m.type==='castAction'&&net.host){handleCast(m.caster,m.key,m.score);syncState()}if(m.type==='snapshot'&&!net.host){net.peer=true;Object.assign(state,m.state);renderUI();updateRoomBox()}if(m.type==='peerLeft')toast('Friend disconnected');if(m.type==='error')toast(m.message)}function subscribeNtfy(){if(net.es)net.es.close();net.es=new EventSource(net.api+'/'+ntfyTopic()+'/sse?since=now');net.es.onmessage=e=>{try{let outer=JSON.parse(e.data);if(outer.event&&outer.event!=='message')return;let payload=JSON.parse(outer.message);processNet(payload)}catch(err){}};net.es.onerror=()=>{$('onlineText').textContent='Relay reconnecting...'}}async function sendNtfy(m){let payload=JSON.stringify({sender:net.client,msg:m});await fetch(net.api+'/'+ntfyTopic(),{method:'POST',body:payload})}async function connect(url,name,create,room){net.api=apiBase(url||'https://ntfy.sh');net.transport='ntfy';try{if(create){net.room=makeRoomCode();net.role=0;net.host=true;net.connected=true;net.names=[name||'Player 1','Player 2'];state.match='online';state.f[0].name=net.names[0];state.f[1].name=net.names[1];subscribeNtfy();processNet({type:'created',room:net.room,player:0});await sendNtfy({type:'hostOpen',name:net.names[0]});}else{net.room=String(room||'').trim().toUpperCase();if(!net.room)return toast('Enter room code');net.role=1;net.host=false;net.connected=true;net.names=['Player 1',name||'Player 2'];state.match='online';state.f[1].name=net.names[1];subscribeNtfy();processNet({type:'joined',room:net.room,player:1});await sendNtfy({type:'peerJoined',name:net.names[1]});}}catch(e){toast('Direct online relay failed. Check internet or try again.');showServerHelp(e.message)}}function showServerHelp(extra){$('modalBox').innerHTML='<h2>Direct online connection failed</h2><p>This version uses a public internet relay so you do not need LAN or local setup. If it fails, your browser/network may be blocking access to <b>ntfy.sh</b>.</p><ol><li>Make sure you are connected to the internet.</li><li>Keep the server field as <b>https://ntfy.sh</b>.</li><li>Create a new room and send the room code/link to your friend.</li><li>If your school/company network blocks it, use another network or deploy the included Node server.</li></ol><p class="small">Details: '+(extra||'connection failed')+'</p><button class="primary" onclick="document.getElementById(\'modal\').style.display=\'none\'">Close</button>';$('modal').style.display='grid'}async function sendNet(m){if(!net.connected||!net.room)return;try{await sendNtfy(m)}catch(e){toast('Could not send online message')}}function syncState(){if(net.host)sendNet({type:'snapshot',state:JSON.parse(JSON.stringify(state))})}
function comboHTML(){let seen={};return Object.entries(combos).filter(([k])=>{let parts=k.split('+').sort().join('+');if(seen[parts])return false;seen[parts]=1;return true}).map(([k,c])=>'<div class="spell"><div class="glyph" style="color:'+c.col+'">✦</div><div><b>'+c.n+'</b><p>'+k.replace('+',' → ')+' — '+c.txt+'</p></div><div class="cost">combo</div></div>').join('')}function spellHTML(){return Object.entries(spells).map(([k,s])=>'<div class="spell"><div class="glyph" style="color:'+s.col+'">'+s.g+'</div><div><b>'+s.n+'</b><p>'+k+' — '+s.effect+'</p></div><div class="cost">'+s.cost+'</div></div>').join('')+'<div class="manualBox"><h3>Combo Chains</h3><p class="small">Cast linked runes back-to-back with the same fighter to trigger bonus magic.</p></div>'+comboHTML()}$('spellList').innerHTML=spellHTML();function manualHTML(){return'<div class="manualBox"><h3>User Manual</h3><ol><li><b>Turn-by-turn:</b> only active player draws. The top center clearly says YOUR ACTION or OPPONENT ACTION online.</li><li><b>Rapid:</b> both players select/draw a rune. After both are ready, both spells fire together.</li><li><b>Continuous:</b> no turns. Draw whenever your cooldown is ready. Online players can attack independently.</li><li><b>Direct Online:</b> both players open this same game page, use relay <b>https://ntfy.sh</b>, create/join with room code, then host starts.</li><li><b>Combo system:</b> cast special rune pairs back-to-back, like circle → zigzag, to trigger unique bonus spells.</li><li>Clean, large drawings give higher accuracy, stronger spells, and better mana efficiency.</li></ol></div><div class="manualBox"><h3>Unique Combo Chains</h3><p class="small">Combos work in both orders. Example: Circle then Zigzag, or Zigzag then Circle.</p></div><div class="grid">'+comboHTML()+'</div><div class="manualBox"><h3>Rune Spellbook</h3></div><div class="grid">'+Object.entries(spells).map(([k,s])=>'<div class="spell"><div class="glyph" style="color:'+s.col+'">'+s.g+'</div><div><b>'+s.n+'</b><p><b>'+k+'</b>: '+s.tip+'. '+s.effect+'.</p></div><div class="cost">'+s.cost+'</div></div>').join('')+'</div>'}function renderTab(tab){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));let html='';if(tab==='play')html='<div class="grid"><div class="mode"><h3>Local / AI Match</h3><div class="row"><input id="p1" value="Player 1"><input id="p2" value="Player 2"></div><div class="row"><select id="flow"><option value="turn">Turn-by-turn</option><option value="rapid">Rapid simultaneous</option><option value="continuous">Continuous realtime</option></select><select id="localMode"><option value="ai">VS AI</option><option value="pvp">Local 2 Players</option><option value="aivai">AI vs AI</option></select></div><button class="primary" id="startLocal">Start Match</button></div><div class="mode"><h3>Flow modes</h3><p><span class="pill">Turn</span> active player only.<br><span class="pill">Rapid</span> both draw, then attacks happen together.<br><span class="pill">Continuous</span> draw whenever ready; best for online realtime.</p></div></div>';if(tab==='online')html='<div class="grid"><div class="mode"><h3>Create direct online room</h3><p>No local server/LAN needed. Create a public relay room and send the code/link to your friend.</p><div class="row"><input id="wsUrl" value="'+defaultWS()+'"><input id="onName" value="Player 1"></div><div class="row"><select id="onFlow"><option value="turn">Turn-by-turn</option><option value="rapid">Rapid simultaneous</option><option value="continuous">Continuous realtime</option></select><button class="primary" id="createRoom">Create Room</button></div><button id="startOnline" class="primary">Start Online Match</button><p id="onlineRoom" class="small"></p></div><div class="mode"><h3>Join friend</h3><div class="row"><input id="joinUrl" value="'+defaultWS()+'"><input id="joinName" value="Player 2"></div><div class="row"><input id="roomCode" placeholder="Room code"><button class="primary" id="joinRoom">Join Room</button></div><p class="small">Guest draws on their own browser. Both PCs connect through the public relay. Host syncs combat state.</p></div></div>';if(tab==='manual')html=manualHTML();$('tabContent').innerHTML=html;if(tab==='play')setTimeout(()=>{$('startLocal').onclick=()=>start($('localMode').value,$('flow').value,$('p1').value,$('p2').value)},0);if(tab==='online')setTimeout(()=>{$('createRoom').onclick=()=>connect($('wsUrl').value,$('onName').value,true);$('joinRoom').onclick=()=>connect($('joinUrl').value,$('joinName').value,false,$('roomCode').value);$('startOnline').onclick=()=>{if(!net.host)return toast('Only host can start');let p1=(net.names&&net.names[0])||'Player 1',p2=(net.names&&net.names[1])||'Player 2';start('online',$('onFlow').value,p1,p2)}},0)}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>renderTab(b.dataset.tab));$('menuBtn').onclick=()=>{$('menu').style.display='grid';renderTab('play')};$('manualBtn').onclick=()=>{$('modalBox').innerHTML=manualHTML()+'<p><button class="primary" onclick="document.getElementById(\'modal\').style.display=\'none\'">Close</button></p>';$('modal').style.display='grid'};$('quickManual').onclick=$('manualBtn').onclick;$('modal').onclick=e=>{if(e.target.id==='modal')$('modal').style.display='none'};$('restart').onclick=()=>start(state.match,state.flow,state.f[0].name,state.f[1].name);$('clear').onclick=drawBase;$('rest').onclick=rest;let joinRoomParam=new URLSearchParams(location.search).get('room');if(joinRoomParam){renderTab('online');setTimeout(()=>{if($('roomCode'))$('roomCode').value=joinRoomParam.toUpperCase();},0)}else renderTab('play');renderUI();})();
</script></body></html>
